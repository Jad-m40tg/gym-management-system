<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
    
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap'); 
@import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
    body {
        font-family: "Inter", sans-serif;
        margin: 0;
        background-color: #000000;
    }
    header {
        background-color: #333;
        color: white;
        padding: 1rem;
        font-family: "Kanit", sans-serif;
        font-weight: normal;
        text-align: center;
    }
    .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
    }
    .stats {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
    }
    .stat-card {
        flex: 1 1 170px;
        background-color: rgba(14, 13, 13, 0.667);
        padding: 1.5rem;
        border: 0.1rem solid #2d2d2d9e;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
        transition: 0.3s ease ;
        cursor: pointer;
    }
    .stat-card:hover {
        transform:translateY(-6px) ;
        box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }
    .stat-card h3 {
        margin: 0.1rem 0;
        color: antiquewhite;
        align-items: center;
        font-family: "Inter", sans-serif;
        font-size: 20px;
        font-weight: 600;
    }
    .stat-card p {
        color: #ffffff;
        margin: 0;
    }
    table {
  width: 100%;
  color: aliceblue;
  font-family: "Inter", sans-serif;
  border-collapse: collapse;
  background: #1a1a1a;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

caption {
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 15px;
  color: rgb(200,230,90);
  letter-spacing: 1px;
}

th, td {
  padding: 16px 20px;
  text-align: left;
  border-bottom: 1px solid #333;
}

th {
  background-color: #252525;
  color: #888;
  font-size: 0.9rem;
  text-transform: uppercase;
  border-bottom: solid 2px rgb(200,230,90);
}

tr:nth-child(even) {
  background-color: #212121;
}

tr:hover {
  background-color: #2a2a2a;
  transition: 0.2s ease;
}

tr:last-child td {
  border-bottom: solid 2px rgb(200,230,90);
}

td:last-child {
  font-weight: bold;
  color: rgb(200,230,90);
}

/* ===== CLASS LINKS ===== */

td a{
    color:white;
    text-decoration:none;
}

td a:hover{
    color:rgb(200,230,90);
}

/* ===== FILTER NOTE ===== */

.filter-note{
    margin-top:25px;
    text-align:center;
    color:#888;
    font-size:14px;
}

        border-collapse: collapse;

    }
    th, td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }
    th {
        background-color: #4CAF50;
        color: white;
    }
    tr:hover {
        background-color: #f1f1f1;
    /* }* */
</style>
</head>
<body>

<header>
    <h1>Admin Dashboard</h1>
</header>

<div class="container">

    <div class="stats">
        <div class="stat-card">
            <h3>Users</h3>
            <p>120</p>
        </div>
        <div class="stat-card">
            <h3>Revenue</h3>
            <p>$3,400</p>
        </div>
        <div class="stat-card">
            <h3>Active Plans</h3>
            <p>75</p>
        </div>
        <div class="stat-card">
            <h3>Pending Payments</h3>
            <p>12</p>
        </div>
    </div>

    <h2>User List</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Plan</th>
                <th>Join Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>User Name</td>

            </tr>
            <tr>
                <td>User Name</td>
                <td>user2@example.com</td>
                <td>Silver</td>
                <td>1-1-2026</td>
                <td>Active</td>
            </tr>
            <tr>
                <td>User Name</td>
                <td>user3@example.com</td>
                <td>Bronze</td>
                <td>1-1-2026</td>
                <td>Pending</td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
