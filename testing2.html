    }
    .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 300px));

    gap: 30px;
    padding: 20px;
}


    /* Card Pattern */
    .card {

        margin-bottom: 8px;
    }
    .card h3 { 
        margin-bottom: 10px;
        font-size: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    }
